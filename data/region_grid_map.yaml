# Cloud region → electricity grid zone mapping
# grid_zone: Electricity Maps zone ID (also used as our canonical zone identifier)
# eia_respondent: EIA Form 930 balancing authority code (US only)
# gridstatus_iso: GridStatus.io ISO identifier for fuel mix dataset (NA only)
#
# Providers by zone:
#   US zones:     EIA (live) → GridStatus → Mock
#   UK zones:     UK Carbon Intensity API (free, no key)
#   EU zones:     ENTSO-E (free token) → Open-Meteo → Mock
#   AU zones:     AEMO (free, no key)
#   IN zones:     Grid India (free, no key)
#   BR zones:     ONS Brazil (free, no key)
#   ZA zone:      Eskom (heuristic)
#   Other zones:  Open-Meteo (weather) → Mock

