apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: carbon-mesh
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  CARBON_LENS_EIA_API_KEY: {{ .Values.carbonProviders.eiaApiKey | quote }}
  CARBON_LENS_GRID_STATUS_API_KEY: {{ .Values.carbonProviders.gridStatusApiKey | quote }}
  CARBON_LENS_ENTSOE_TOKEN: {{ .Values.carbonProviders.entsoeToken | quote }}
  CARBON_LENS_ELECTRICITY_MAPS_API_KEY: {{ .Values.carbonProviders.electricityMapsApiKey | quote }}
  CARBON_LENS_ADMIN_SECRET: {{ .Values.config.adminSecret | quote }}
  {{- if .Values.database.url }}
  CARBON_LENS_DATABASE_URL: {{ .Values.database.url | quote }}
  {{- end }}
  {{- if .Values.stripe.secretKey }}
  CARBON_LENS_STRIPE_SECRET_KEY: {{ .Values.stripe.secretKey | quote }}
  CARBON_LENS_STRIPE_WEBHOOK_SECRET: {{ .Values.stripe.webhookSecret | quote }}
  CARBON_LENS_STRIPE_PRICE_ID_PRO: {{ .Values.stripe.priceIdPro | quote }}
  CARBON_LENS_STRIPE_PRICE_ID_ENTERPRISE: {{ .Values.stripe.priceIdEnterprise | quote }}
  {{- end }}
