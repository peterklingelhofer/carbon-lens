{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: carbon-mesh
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  {{- if .Values.database.url }}
  database-url: {{ .Values.database.url | quote }}
  {{- end }}
  {{- if .Values.carbonProviders.eiaApiKey }}
  eia-api-key: {{ .Values.carbonProviders.eiaApiKey | quote }}
  {{- end }}
  {{- if .Values.carbonProviders.gridStatusApiKey }}
  gridstatus-api-key: {{ .Values.carbonProviders.gridStatusApiKey | quote }}
  {{- end }}
  {{- if .Values.carbonProviders.entsoeToken }}
  entsoe-token: {{ .Values.carbonProviders.entsoeToken | quote }}
  {{- end }}
  {{- if .Values.carbonProviders.electricityMapsApiKey }}
  electricity-maps-api-key: {{ .Values.carbonProviders.electricityMapsApiKey | quote }}
  {{- end }}
  {{- if .Values.stripe.secretKey }}
  stripe-secret-key: {{ .Values.stripe.secretKey | quote }}
  stripe-webhook-secret: {{ .Values.stripe.webhookSecret | quote }}
  {{- end }}
{{- end }}
