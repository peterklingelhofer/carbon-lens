apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: carbon-mesh
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  CARBON_LENS_CARBON_SOURCE: {{ .Values.config.carbonSource | quote }}
  CARBON_LENS_CACHE_TTL_SECONDS: {{ .Values.config.cacheTtlSeconds | quote }}
  CARBON_LENS_API_KEY_REQUIRED: {{ .Values.config.apiKeyRequired | quote }}
  CARBON_LENS_LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  CARBON_LENS_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  CARBON_LENS_AUTO_MIGRATE: {{ .Values.config.autoMigrate | quote }}
  CARBON_LENS_RATE_LIMIT_DEFAULT: {{ .Values.config.rateLimit | quote }}
  CARBON_LENS_USE_DATABASE: {{ .Values.database.enabled | quote }}
  CARBON_LENS_HOST: "0.0.0.0"
  CARBON_LENS_PORT: "8000"
