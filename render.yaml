# Render Blueprint — one-click deploy at https://render.com/deploy
# Click "New Blueprint Instance" and point to this repo.

# Oregon is Render's greenest free region (Pacific Northwest / BPA hydro grid,
# ~90-150 gCO2/kWh) vs Ohio/Virginia (~360-400). Pin it explicitly so the
# service can't silently drift onto a dirtier default -- a carbon tool should
# run on a clean grid, and Oregon is free. Services and DB must share a region.
databases:
  - name: carbon-mesh-db
    plan: free
    region: oregon
    databaseName: carbon_mesh
    user: carbon_mesh
    ipAllowList: []

services:
  - type: web
    name: carbon-mesh-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: CARBON_LENS_USE_DATABASE
        value: "true"
      - key: CARBON_LENS_DATABASE_URL
        fromDatabase:
          name: carbon-mesh-db
          property: connectionString
        # Render provides postgres:// — we need postgresql+asyncpg://
        # The app handles this transformation at startup
      - key: CARBON_LENS_HOST
        value: "0.0.0.0"
      - key: CARBON_LENS_PORT
        value: "8000"
      - key: CARBON_LENS_LOG_FORMAT
        value: json
      - key: CARBON_LENS_CORS_ORIGINS
        value: '["https://carbonlens.peterklingelhofer.workers.dev","http://localhost:5173","http://localhost:4173"]'
      - key: CARBON_LENS_API_KEY_REQUIRED
        value: "false"
      - key: CARBON_LENS_ADMIN_SECRET
        generateValue: true
      - key: CARBON_LENS_EIA_API_KEY
        sync: false  # User fills in after deploy
      - key: CARBON_LENS_GRID_STATUS_API_KEY
        sync: false
      - key: CARBON_LENS_ENTSOE_TOKEN
        sync: false
    healthCheckPath: /ready
    autoDeploy: true

  - type: web
    name: carbon-mesh-web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./web/Dockerfile
    dockerContext: ./web
    autoDeploy: true
