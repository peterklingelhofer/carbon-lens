name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on a branch/PR so rapid pushes don't keep whole
# pipelines (incl. the Docker builds) burning runners to no purpose. Never
# cancel main pushes (they publish images).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: carbon_mesh
          POSTGRES_PASSWORD: carbon_mesh
          POSTGRES_DB: carbon_mesh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carbon_mesh"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: |
          uv run ruff check src
          uv run ruff format --check src

      - name: Type check
        run: uv run pyright src

      - name: OpenAPI spec up to date
        env:
          CARBON_LENS_CARBON_SOURCE: mock
        run: |
          uv run python scripts/export_openapi.py --out openapi.json
          git diff --exit-code openapi.json

      - name: Test
        env:
          CARBON_LENS_CARBON_SOURCE: mock
          CARBON_LENS_DATABASE_URL: postgresql+asyncpg://carbon_mesh:carbon_mesh@localhost:5432/carbon_mesh
        run: uv run pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: API client up to date
        run: |
          npm run gen:api
          git diff --exit-code src/api/schema.ts

      - name: TypeScript check
        run: npx tsc -b

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # GHCR repo paths must be lowercase
      - name: Set image namespace
        id: ns
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      # Publish only on push to main; PRs build-only to verify the Dockerfiles
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main) API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.ns.outputs.repo }}/api:latest
            ghcr.io/${{ steps.ns.outputs.repo }}/api:${{ github.sha }}
          # Reuse unchanged layers across runs instead of rebuilding from scratch
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build (and push on main) Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ steps.ns.outputs.repo }}/web:latest
            ghcr.io/${{ steps.ns.outputs.repo }}/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
