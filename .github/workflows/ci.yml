name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: carbon_mesh
          POSTGRES_PASSWORD: carbon_mesh
          POSTGRES_DB: carbon_mesh
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carbon_mesh"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: |
          uv run ruff check src
          uv run ruff format --check src

      - name: Test
        env:
          CARBON_MESH_CARBON_SOURCE: mock
          CARBON_MESH_DATABASE_URL: postgresql+asyncpg://carbon_mesh:carbon_mesh@localhost:5432/carbon_mesh
        run: uv run pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript check
        run: npx tsc -b

      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t carbonlens-api .

      - name: Build Web image
        run: docker build -t carbonlens-web ./web
