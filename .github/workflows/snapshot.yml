name: Carbon snapshot

# Pulls real carbon data from grid-operator APIs on a schedule and publishes a
# static JSON to the `data` branch. The frontend reads that JSON from a CDN, so
# viewer traffic never hits upstream providers: quota cost is fixed at
# (zones x runs/day) regardless of how many people view the site.

on:
  schedule:
    # Every 30 min. Grid carbon only updates every ~30-60 min, and this keeps
    # private-repo Actions minutes well under the free 2000/month.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

# GitHub scheduled crons are best-effort and may be delayed under load. The
# frontend shows a "last updated" badge so staleness is always visible.

permissions:
  contents: write

concurrency:
  group: carbon-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build snapshot
        env:
          CARBON_LENS_CARBON_SOURCE: hybrid
          CARBON_LENS_EIA_API_KEY: ${{ secrets.CARBON_LENS_EIA_API_KEY }}
          CARBON_LENS_ENTSOE_TOKEN: ${{ secrets.CARBON_LENS_ENTSOE_TOKEN }}
          CARBON_LENS_GRID_STATUS_API_KEY: ${{ secrets.CARBON_LENS_GRID_STATUS_API_KEY }}
        run: uv run python scripts/build_snapshot.py --out snapshot.json --min-live 5

      # A small, citable 'state of clean compute' artifact: which grids reward
      # carbon-aware scheduling most, and which regions are greenest to host on.
      # Computed from the freshly-built history -- reuses this cron, no extra cost.
      # Pull the live deployment's org-statement (which carries forecast_calibration)
      # so the public report shows how accurate our forecasts have actually been.
      # Best-effort: if the API is unreachable or has no ledger, calibration is omitted.
      - name: Build clean-compute report
        env:
          REPORT_API_URL: ${{ secrets.CARBON_LENS_REPORT_API_URL || 'https://carbonlens-gssa.onrender.com' }}
        run: |
          curl -fsS "${REPORT_API_URL%/}/api/v1/accounting/org-statement" -o org_statement.json || true
          uv run python scripts/build_clean_compute_report.py \
            --history history.json --snapshot snapshot.json --out clean_compute_report.json \
            --calibration org_statement.json || true

      - name: Publish to data branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/pub
          cp snapshot.json /tmp/pub/snapshot.json
          cp history.json /tmp/pub/history.json
          cp history.csv /tmp/pub/history.csv
          cp clean_compute_report.json /tmp/pub/clean_compute_report.json 2>/dev/null || true
          cp clean_compute_history.json /tmp/pub/clean_compute_history.json 2>/dev/null || true
          cd /tmp/pub
          git init -q
          git checkout -q -b data
          git add -A
          git -c user.name="carbonlens-bot" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -qm "snapshot ${{ github.run_id }}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" data
