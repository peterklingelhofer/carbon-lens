name: CD

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  # Build and publish container images to GHCR on every green merge to main.
  # Uses the built-in GITHUB_TOKEN — no external accounts or secrets required.
  push-images:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image namespace
        id: ns
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.repo }}/api:latest
            ghcr.io/${{ steps.ns.outputs.repo }}/api:${{ github.sha }}

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.repo }}/web:latest
            ghcr.io/${{ steps.ns.outputs.repo }}/web:${{ github.sha }}

  # PaaS deploys (Fly / Render / Railway) need account secrets — see docs/DEPLOY.md.
  # Render auto-deploys from git; Fly/Railway examples live in that doc.
