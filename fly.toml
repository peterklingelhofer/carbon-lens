# Fly.io deployment config
# Deploy: fly launch --copy-config --yes
# Set secrets: fly secrets set CARBON_MESH_EIA_API_KEY=xxx ...
# Attach Postgres: fly postgres create && fly postgres attach

app = "carbon-mesh"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  CARBON_MESH_HOST = "0.0.0.0"
  CARBON_MESH_PORT = "8000"
  CARBON_MESH_USE_DATABASE = "true"
  CARBON_MESH_LOG_FORMAT = "json"
  CARBON_MESH_API_KEY_REQUIRED = "false"
  CARBON_MESH_CARBON_SOURCE = "hybrid"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/ready"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
