# Fly.io deployment config
# Deploy: fly launch --copy-config --yes
# Set secrets: fly secrets set CARBON_LENS_EIA_API_KEY=xxx ...
# Attach Postgres: fly postgres create && fly postgres attach

app = "carbon-mesh"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  CARBON_LENS_HOST = "0.0.0.0"
  CARBON_LENS_PORT = "8000"
  CARBON_LENS_USE_DATABASE = "false"
  CARBON_LENS_LOG_FORMAT = "json"
  CARBON_LENS_API_KEY_REQUIRED = "false"
  CARBON_LENS_CARBON_SOURCE = "hybrid"
  # Allow the Cloudflare Pages frontend to call this API from the browser.
  # Update if your Pages project name differs from "carbon-mesh".
  CARBON_LENS_CORS_ORIGINS = '["https://carbon-mesh.pages.dev","http://localhost:5173"]'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/ready"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
