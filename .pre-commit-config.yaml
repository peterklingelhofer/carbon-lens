# Activate once with:  uv run pre-commit install --install-hooks
# (default_install_hook_types wires up both the pre-commit and commit-msg hooks).
# Update pinned revs with:  uv run pre-commit autoupdate
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # Backend (Python): lint + format. ruff-format auto-formats staged files, so a
  # mis-formatted file like the one that failed CI gets fixed before it commits.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Backend type check + spec sync -- mirror what CI enforces so a type error or a
  # stale openapi.json / schema.ts is caught here, never in CI.
  - repo: local
    hooks:
      - id: pyright
        name: pyright (backend type check)
        language: system
        entry: bash -c 'uv run pyright src'
        files: ^src/.*\.py$
        pass_filenames: false
      # Regenerate the OpenAPI spec AND the TS client whenever the backend changes.
      # If either drifts, the files are rewritten and the commit stops so they get
      # re-staged -- the same self-healing behaviour as ruff-format.
      - id: api-sync
        name: openapi + api client up to date
        language: system
        entry: bash -c 'CARBON_LENS_CARBON_SOURCE=mock uv run python scripts/export_openapi.py --out openapi.json && cd web && npm run gen:api'
        files: ^(src/carbon_mesh/.*\.py|openapi\.json)$
        pass_filenames: false

  # Frontend (web/): typecheck + lint on any staged web source. These call the
  # project scripts, so they track whatever the web toolchain uses.
  - repo: local
    hooks:
      - id: web-typecheck
        name: web typecheck (tsc)
        language: system
        entry: bash -c 'cd web && npx tsc -b'
        files: ^web/.*\.(ts|tsx)$
        pass_filenames: false
      - id: web-lint
        name: web lint
        language: system
        entry: bash -c 'cd web && npm run lint'
        files: ^web/.*\.(ts|tsx|js|jsx|json|css)$
        pass_filenames: false

  # Commit messages: enforce Conventional Commits (feat:, fix:, …) at commit-msg.
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
