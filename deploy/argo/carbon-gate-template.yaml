# Reusable carbon gate for Argo Workflows. A `script` step that asks CarbonLens
# whether `region` is a good time to run and prints "clean" or "dirty" (captured as
# its `outputs.result`). Gate flexible work on it with a `when:` expression -- so a
# workflow runs the heavy step only on clean power, no app changes.
#
#   kubectl apply -f deploy/argo/carbon-gate-template.yaml
#
# Reuses carbon_mesh.sdk (same marginal/clean-surplus decision as every other
# surface), so it needs an image with carbon_mesh installed (the API image works).
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: carbon-gate
spec:
  templates:
    - name: gate
      inputs:
        parameters:
          - name: region # provider/region, e.g. aws/us-east-1 (or zone/FR on-prem)
          - name: max-intensity # optional gCO2/kWh cap; "" to ignore
            value: ""
          - name: api-url
            value: "https://carbonlens-gssa.onrender.com"
      script:
        image: ghcr.io/peterklingelhofer/carbonlens/api:latest
        command: [python]
        source: |
          from carbon_mesh.sdk import CarbonClient
          mi = "{{inputs.parameters.max-intensity}}".strip()
          ok = CarbonClient("{{inputs.parameters.api-url}}").is_good_time(
              "{{inputs.parameters.region}}", float(mi) if mi else None
          )
          print("clean" if ok else "dirty")
